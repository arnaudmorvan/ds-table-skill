# Property Map — Mapping bidirectionnel Theme ↔ Figma ↔ CSS/React
#
# Chaque propriété du fichier .theme.yaml a un équivalent Figma Plugin API
# et un équivalent CSS. Ce fichier sert de référence pour les générateurs.

properties:
  # ─── Couleurs ───
  fill:
    figma: "fills (SolidPaint) + variable bind"
    css: "background-color"
    react: "backgroundColor"
    notes: "Résoudre valuesByMode + appliquer comme fill de base PUIS binder"

  color:
    figma: "fills on TextNode + variable bind"
    css: "color"
    react: "color"

  border:
    figma: "strokes (SolidPaint) + variable bind"
    css: "border-color"
    react: "borderColor"

  borderWidth:
    figma: "strokeWeight"
    css: "border-width"
    react: "borderWidth"

  borderBottom:
    figma: "strokes + strokeAlign INSIDE + strokeBottomWeight"
    css: "border-bottom-color"
    react: "borderBottomColor"

  borderRight:
    figma: "strokes + strokeAlign INSIDE + strokeRightWeight"
    css: "border-right-color"
    react: "borderRightColor"

  # ─── Dimensions ───
  width:
    figma: "resize(w, h)"
    css: "width"
    react: "width"

  height:
    figma: "resize(w, h)"
    css: "height"
    react: "height"

  minHeight:
    figma: "minHeight + variable bind"
    css: "min-height"
    react: "minHeight"

  # ─── Spacing ───
  gap:
    figma: "itemSpacing"
    css: "gap"
    react: "gap"

  padding:
    figma: "paddingTop/Right/Bottom/Left"
    css: "padding"
    react: "padding"
    format: "top right bottom left (ou valeur unique)"

  paddingH:
    figma: "paddingLeft + paddingRight"
    css: "padding-inline"
    react: "paddingInline"

  paddingV:
    figma: "paddingTop + paddingBottom"
    css: "padding-block"
    react: "paddingBlock"

  # ─── Rayon ───
  cornerRadius:
    figma: "cornerRadius + variable bind"
    css: "border-radius"
    react: "borderRadius"

  # ─── Ombres ───
  shadow:
    figma: "effects (DROP_SHADOW) — blendMode: 'NORMAL' requis"
    css: "box-shadow"
    react: "boxShadow"

  # ─── Typographie ───
  font:
    figma: "Style token ref (fontFamily + fontSize + fontWeight)"
    css: "font (shorthand) via design token"
    react: "className ou style composé"
    notes: "Format: category/scale-weight (ex: body/md-medium)"

  # ─── Opacité ───
  opacity:
    figma: "opacity (0-1)"
    css: "opacity"
    react: "opacity"

  # ─── Focus / Outline (CSS only) ───
  outline:
    figma: null
    css: "outline"
    react: "outline"
    css_only: true
    notes: "Figma: simulé via stroke + offset frame"

  outlineOffset:
    figma: null
    css: "outline-offset"
    react: "outlineOffset"
    css_only: true

  # ─── SVG / Vecteurs ───
  strokeWeight:
    figma: "strokeWeight"
    css: "stroke-width (SVG)"
    react: "strokeWidth"

  stroke:
    figma: "strokes (SolidPaint) on vector"
    css: "stroke (SVG)"
    react: "stroke"

  strokeCap:
    figma: "strokeCap"
    css: "stroke-linecap"
    react: "strokeLinecap"

  strokeJoin:
    figma: "strokeJoin"
    css: "stroke-linejoin"
    react: "strokeLinejoin"

  # ─── CSS/React only ───
  transition:
    figma: null
    css: "transition"
    react: "transition"
    css_only: true

  cursor:
    figma: null
    css: "cursor"
    react: "cursor"
    css_only: true

# ─── Sizing Modes (STRUCTURE, pas theme) ───
# Ces propriétés restent dans le fichier structure (.yaml) :
#   FILL → Figma: layoutSizingHorizontal/Vertical = "FILL"  | CSS: flex: 1
#   HUG  → Figma: primaryAxisSizingMode = "AUTO"            | CSS: width: fit-content
#   direction: VERTICAL/HORIZONTAL → Figma: layoutMode       | CSS: flex-direction
