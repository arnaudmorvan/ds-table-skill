# CSpec — template/table (Structure)

meta:
  name: "template/table"
  level: 3
  intent: layout-template
  target_page: "🔒 _Components"
  phase: "03-layouts"

variants:
  properties: []

layout:
  type: COMPONENT
  name: "template/table"
  direction: HORIZONTAL
  sizing: { width: 1440, height: 900 }
  clipsContent: true
  children:
    - type: SLOT
      name: "sidebar"
      direction: VERTICAL
      sizing: { width: 240, height: FILL }
      children:
        - type: SLOT
          name: "logo"
          sizing: { width: FILL, height: 40 }
        - type: SLOT
          name: "nav-items"
          sizing: { width: FILL, height: FILL }
        - type: SLOT
          name: "sidebar-footer"
          sizing: { width: FILL, height: 40 }
    - type: FRAME
      name: "main"
      direction: VERTICAL
      sizing: { width: FILL, height: FILL }
      children:
        - type: SLOT
          name: "topbar"
          sizing: { width: FILL, height: 64 }
        - type: FRAME
          name: "content-area"
          direction: VERTICAL
          sizing: { width: FILL, height: FILL }
          children:
            - type: SLOT
              name: "table-header"
              sizing: { width: FILL, height: 48 }
            - type: SLOT
              name: "table-content"
              sizing: { width: FILL, height: FILL }
            - type: SLOT
              name: "table-pagination"
              sizing: { width: FILL, height: 48 }


defaults:
  root:
    fill: $Neutral/colorBg

  sidebar: { gap: 16, padding: 16 }
  topbar: { counterAxisAlignItems: CENTER, paddingH: 16, gap: 16 }
  content-area: { padding: 0, gap: 0 }

  slots:
    sidebar: { fill: "#EBE0FF", opacity: 0.5 }
    logo: { fill: "#FFF8E0", opacity: 0.5 }
    nav-items: { fill: "#EBE0FF", opacity: 0.5 }
    sidebar-footer: { fill: "#E0FFED", opacity: 0.5 }
    topbar: { fill: "#FFE0ED", opacity: 0.5 }
    table-header: { fill: "#FFE0ED", opacity: 0.5 }
    table-content: { fill: "#E0F0FF", opacity: 0.5 }
    table-pagination: { fill: "#E0FFED", opacity: 0.5 }

ds_components: []
learnings: []
acceptance:
  - "Content = VERTICAL : table-header 48 + table-content FILL + table-pagination 48"
